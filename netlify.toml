[build]
  command = "npm run build"
  publish = "dist"

# Prevent Netlify CDN from caching API responses
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# Proxy /api/* to Railway backend — avoids CORS entirely
[[redirects]]
  from = "/api/*"
  to = "https://catalogue-production-91fe.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
