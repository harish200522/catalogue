[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api/* to Render backend — avoids CORS entirely
[[redirects]]
  from = "/api/*"
  to = "https://catalogue-production-91fe.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
